name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "apache-airflow==2.10.5" --constraint "$(python -c 'import sys; print(f\"https://raw.githubusercontent.com/apache/airflow/constraints-2.10.5/constraints-{sys.version_info.major}.{sys.version_info.minor}.txt\")')"
          pip install -r requirements.txt

      - name: Download NLTK data
        run: |
          python -c "import nltk; nltk.download('punkt'); nltk.download('stopwords')"

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ tests/ dags/ dashboard/

      - name: Test with pytest
        run: |
          pip install pytest pytest-cov
          pytest tests/ -v --cov=src --cov-report=term-missing
